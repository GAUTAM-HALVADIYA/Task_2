<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            rel="stylesheet"
            href="./bootstrap-5.3.8/dist/css/bootstrap.css"
        />
        <script src="./bootstrap-5.3.8/dist/js/bootstrap.js"></script>
        <link rel="stylesheet" href="./css/custom.css" />
    </head>
    <body>
        <header class="gradiant">
            <div class="container">
                <nav class="navbar justify-content-between align-items-center ">
                    <a class="navbar-brand" href="#">
                        <img
                            src="./img/logo.png"
                            alt="logo"
                            width="170"
                            height="30"
                            class="d-inline-block align-text-top"
                        />
                    </a>
                    <div class="nav">
                        <a class="nav-link" href="#" aria-current="page">Home</a>
                        <a class="nav-link" href="#">About us</a>
                        <a class="nav-link" href="#">Pages</a>
                        <a class="nav-link" href="#">Blogs</a>
                        <a class="nav-link" href="#">Contact us</a>
                    </div>
                </nav>
            </div>
            <hr class="">

            <div class="hero container-fluid">
                <div class="row">
                    <div class="text col-md-6">
                        <p class="text-light">I'm <span class="text-black">Linda Susan</span>  Beauty & Lifestyle <div class="text-back"><span class="text-black">Influencer</span></div>  </p>
                    </div>
                    <div class="col-md-6">
                        <img class="" src="./img/women.png" alt="woman" />
                    </div>
                </div>
            </div>
        </header>

        <section class="container">
            <div class="social">
                <div class="d-flex justify-content-between ">

                    <div class="d-flex justify-content-between p-3 align-items-center border ">
                        <img src="./img/facebook 1.png" alt="">
                        <div class="d-flex flex-column align-items-start  content">
                            <p class="m-0">Facebook</p>
                            <p class="m-0">20.5K followers</p>
                        </div>
                        <button class="btn text-light m-l">
                            Follow Me
                        </button>
                    </div>
                    <div class="d-flex justify-content-between p-3 align-items-center border ">
                        <img src="./img/instagram 1.png" alt="">
                        <div  class="d-flex flex-column align-items-start content">
                            <p class="m-0">Instagram</p>
                            <p class="m-0">25K followers</p>
                        </div>
                        <button class="btn text-light m-l">
                            Follow Me
                        </button>
                    </div>
               
               
                    <div class="d-flex justify-content-between p-3 align-items-center border ">
                        <img src="./img/youtube 1.png" alt="">
                        <div class="d-flex flex-column align-items-start content">
                            <p class="m-0">Youtube</p>
                            <p class="m-0">20.5K followers</p>
                        </div>
                        <button class="btn text-light m-l">
                            Follow Me
                        </button>
                    </div>
                </div>
                
            </div>
        </section>

    </body>
</html>
